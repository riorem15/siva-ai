<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>S.I.V.A Core</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #030712; /* Very dark background */
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #00daf3;
        }

        /* Ambient glowing background */
        .ambient-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 218, 243, 0.05) 0%, transparent 60%);
            z-index: 0;
        }

        /* Circuit Lines Animation on the sides */
        .circuit-container {
            position: absolute;
            top: 0;
            width: 150px;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            opacity: 0.4;
            transition: opacity 0.5s;
        }
        .circuit-left { left: 0; }
        .circuit-right { right: 0; transform: scaleX(-1); }

        .data-line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #00daf3, transparent);
            animation: data-flow linear infinite;
        }

        .dl-1 { left: 20px; height: 30vh; animation-duration: 3s; animation-delay: 0s; }
        .dl-2 { left: 60px; height: 50vh; animation-duration: 5s; animation-delay: 1s; }
        .dl-3 { left: 100px; height: 40vh; animation-duration: 4s; animation-delay: 2s; }
        .dl-4 { left: 130px; height: 20vh; animation-duration: 2.5s; animation-delay: 0.5s; }

        @keyframes data-flow {
            0% { top: -50vh; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 150vh; opacity: 0; }
        }

        .state-active .circuit-container { opacity: 0.8; }
        .state-active .data-line { background: linear-gradient(to bottom, transparent, #00e5ff, transparent); animation-duration: 1.5s !important; }

        /* Container for the Orb */
        .siva-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* Hover effect when idle */
        .siva-container:hover {
            transform: scale(1.05);
        }

        /* Rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            box-sizing: border-box;
            transition: all 1s ease-in-out;
        }

        /* Standby speeds (slow) */
        .outer-ring {
            width: 350px;
            height: 350px;
            border-top: 4px solid rgba(0, 218, 243, 0.8);
            border-bottom: 4px solid rgba(0, 218, 243, 0.8);
            animation: spin 12s linear infinite;
            box-shadow: 0 0 20px rgba(0, 218, 243, 0.2);
        }

        .middle-ring {
            width: 280px;
            height: 280px;
            border-left: 3px solid rgba(0, 218, 243, 0.5);
            border-right: 3px solid rgba(0, 218, 243, 0.5);
            animation: spin-reverse 8s linear infinite;
        }

        .inner-ring {
            width: 220px;
            height: 220px;
            border: 2px dashed rgba(0, 218, 243, 0.3);
            animation: spin 15s linear infinite;
        }

        /* The Core Center */
        .core {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(0, 218, 243, 0.1) 0%, transparent 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0, 218, 243, 0.1);
            transition: all 0.5s ease-in-out;
        }

        .core-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 218, 243, 0.8);
            margin-left: 4px; /* compensate for letter spacing */
        }
        
        .core-subtext {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* S.I.V.A Active State (Fast Spin, Bright Glow) */
        .state-active .siva-container {
            transform: scale(1.1);
        }
        .state-active .outer-ring {
            border-top: 6px solid #00daf3;
            border-bottom: 6px solid #00daf3;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 40px rgba(0, 218, 243, 0.8), inset 0 0 20px rgba(0, 218, 243, 0.5);
        }
        .state-active .middle-ring {
            border-left: 4px solid #00daf3;
            border-right: 4px solid #00daf3;
            animation: spin-reverse 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 218, 243, 0.5);
        }
        .state-active .inner-ring {
            border: 3px dashed #00daf3;
            animation: spin 2.5s linear infinite;
        }
        .state-active .core {
            background: radial-gradient(circle at center, rgba(0, 218, 243, 0.4) 0%, transparent 70%);
            box-shadow: 0 0 50px rgba(0, 218, 243, 0.5);
        }

        /* S.I.V.A Processing State (Pulsing) */
        .state-processing .outer-ring { animation: spin 2s linear infinite; }
        .state-processing .middle-ring { animation: spin-reverse 1.5s linear infinite; }
        .state-processing .core {
            animation: pulse-glow 1s alternate infinite;
        }

        /* Dialogue Box below orb */
        .dialogue-container {
            position: absolute;
            bottom: 10%;
            width: 80%;
            max-width: 800px;
            text-align: center;
            z-index: 10;
        }

        .user-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            min-height: 20px;
        }

        .siva-text {
            font-size: 18px;
            color: #00daf3;
            text-shadow: 0 0 8px rgba(0, 218, 243, 0.5);
            line-height: 1.5;
            min-height: 30px;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 0 20px;
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(0, 218, 243, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 60px rgba(0, 218, 243, 0.8); transform: scale(1.05); }
        }

        /* Top Controls */
        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 15px;
        }

        .btn-control {
            background: transparent;
            border: 1px solid rgba(0, 218, 243, 0.2);
            color: rgba(0, 218, 243, 0.5);
            padding: 8px 16px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-control:hover {
            border-color: #00daf3;
            color: #00daf3;
            background: rgba(0, 218, 243, 0.1);
            box-shadow: 0 0 15px rgba(0, 218, 243, 0.3);
        }

        #stop-btn {
            border-color: rgba(243, 0, 80, 0.3);
            color: rgba(243, 0, 80, 0.6);
        }

        #stop-btn:hover {
            border-color: #f30050;
            color: #f30050;
            background: rgba(243, 0, 80, 0.1);
            box-shadow: 0 0 15px rgba(243, 0, 80, 0.4);
        }

        /* Token Monitor */
        .token-monitor {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 218, 243, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: #00daf3;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(0, 218, 243, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
            transition: all 0.3s ease;
        }

        .token-monitor .monitor-title {
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 218, 243, 0.3);
            padding-bottom: 5px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .token-row {
            display: flex;
            justify-content: space-between;
        }
        
        .token-value {
            font-weight: bold;
        }
        
        .token-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 2px;
            overflow: hidden;
        }
        
        .token-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00daf3, #00ffaa);
            width: 0%;
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body id="app-body" class="state-idle">

    <div class="ambient-glow"></div>

    <div class="circuit-container circuit-left">
        <div class="data-line dl-1"></div>
        <div class="data-line dl-2"></div>
        <div class="data-line dl-3"></div>
        <div class="data-line dl-4"></div>
    </div>
    <div class="circuit-container circuit-right">
        <div class="data-line dl-1"></div>
        <div class="data-line dl-2"></div>
        <div class="data-line dl-3"></div>
        <div class="data-line dl-4"></div>
    </div>

    <!-- Token Monitor -->
    <div class="token-monitor" id="token-monitor" style="opacity: 0;">
        <div class="monitor-title">Data Stream (Token)</div>
        <div class="token-row">
            <span>Input (User):</span>
            <span class="token-value" id="token-input">0</span>
        </div>
        <div class="token-row">
            <span>Output (SIVA):</span>
            <span class="token-value" id="token-output">0</span>
        </div>
        <div class="token-row">
            <span>Total Sesi:</span>
            <span class="token-value" id="token-total">0</span>
        </div>
        <div>
            <span style="font-size: 10px; opacity: 0.7;">Kapasitas Memori (1Jt Limit)</span>
            <div class="token-bar-container">
                <div class="token-bar-fill" id="token-bar"></div>
            </div>
        </div>
    </div>

    <!-- Kontrol Manual -->
    <div class="top-controls">
        <button id="sleep-btn" class="btn-control" onclick="window.sivaBrain.toggleSleep()">TIDUR</button>
        <button id="fullscreen-btn" class="btn-control" onclick="toggleFullScreen()">FULL SCREEN</button>
        <button id="stop-btn" class="btn-control" onclick="window.sivaBrain.stopSpeaking()">BERHENTI</button>
    </div>

    <div class="siva-container" id="siva-orb" onclick="window.sivaBrain.triggerWakeUp('Orb Click')">
        <div class="ring outer-ring"></div>
        <div class="ring middle-ring"></div>
        <div class="ring inner-ring"></div>
        <div class="core" id="siva-core">
            <span class="core-text">S.I.V.A</span>
            <span class="core-subtext" id="core-status">STANDBY</span>
        </div>
    </div>

    <div class="dialogue-container">
        <div class="user-text" id="user-transcript">Menunggu aktivasi (Tepuk 3x atau panggil SIVA)...</div>
        <div class="siva-text" id="siva-response"></div>
    </div>

    <!-- Scripts -->
    <script src="siva-visuals.js?v=1"></script>
    <script src="siva-brain.js?v=1"></script>
    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
